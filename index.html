<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local LLM Chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-chat: #0f3460;
      --text: #e6e6e6;
      --text-muted: #a0a0b0;
      --accent: #f47920;
      --user-bg: #533483;
      --assistant-bg: #1a1a40;
      --input-bg: #16213e;
      --border: #2a2a4a;
      --sidebar-width: 280px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    #status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-left: 8px;
      transition: background 0.3s;
    }

    #status-indicator.connected { background: #4caf50; }
    #status-indicator.error { background: var(--accent); }

    /* Main layout with sidebar */
    #app-body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #sidebar-branding {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #header-logo {
      height: 28px;
      width: auto;
      object-fit: contain;
    }

    #sidebar-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    #new-chat-btn {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #new-chat-btn:hover { opacity: 0.85; }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    #chat-list::-webkit-scrollbar { width: 4px; }
    #chat-list::-webkit-scrollbar-track { background: transparent; }
    #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
      gap: 8px;
      position: relative;
    }

    .chat-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .chat-item.active {
      background: rgba(244, 121, 32, 0.15);
      color: var(--text);
    }

    .chat-item .chat-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-item .delete-chat-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .chat-item:hover .delete-chat-btn { opacity: 1; }
    .chat-item .delete-chat-btn:hover { color: #e94960; }

    /* Sidebar bottom sections */
    .sidebar-section {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .sidebar-section-header:hover {
      background: rgba(255,255,255,0.03);
    }

    .sidebar-section-header .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .sidebar-section-header .section-toggle {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .sidebar-section.open .sidebar-section-header .section-toggle {
      transform: rotate(180deg);
    }

    .sidebar-section-body {
      display: none;
      padding: 0 12px 10px 12px;
    }

    .sidebar-section.open .sidebar-section-body {
      display: block;
    }

    /* Sidebar form elements */
    .sidebar-field {
      margin-bottom: 8px;
    }

    .sidebar-field:last-child {
      margin-bottom: 0;
    }

    .sidebar-field label {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 3px;
    }

    .sidebar-field input,
    .sidebar-field select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .sidebar-field input:focus,
    .sidebar-field select:focus {
      border-color: var(--accent);
    }

    /* System prompt area */
    #system-prompt-section .sidebar-section-body {
      padding: 0 12px 8px 12px;
    }

    #system-prompt {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 50px;
      max-height: 300px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.4;
    }

    #system-prompt:focus {
      border-color: var(--accent);
    }

    #system-prompt::placeholder {
      color: var(--text-muted);
    }

    /* System Info in sidebar */
    .sysinfo-grid-sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sysinfo-card-sm {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .sysinfo-card-sm .card-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .sysinfo-card-sm .card-value {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
    }

    .sysinfo-card-sm .detail {
      font-size: 11px;
      color: var(--text-muted);
    }

    .sysinfo-card-sm .status-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
    }

    .status-badge.available {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .status-badge.unavailable {
      background: rgba(233, 69, 96, 0.2);
      color: var(--accent);
    }

    .sysinfo-loading {
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      padding: 6px;
    }

    /* Main content */
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Chat area */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      word-wrap: break-word;
      position: relative;
    }

    .message.user {
      white-space: pre-wrap;
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.system-msg {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      padding: 4px 12px;
    }

    .message .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .message .role-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .message .copy-msg-btn,
    .message .resend-msg-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .message:hover .copy-msg-btn,
    .message:hover .resend-msg-btn {
      opacity: 1;
    }

    .message .copy-msg-btn:hover,
    .message .resend-msg-btn:hover {
      color: var(--accent);
    }

    .typing-indicator {
      display: inline-block;
    }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Input area */
    #input-area {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 150px;
      outline: none;
      transition: border-color 0.2s;
    }

    #message-input:focus {
      border-color: var(--accent);
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    #clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Scrollbar */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Welcome screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-muted);
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    #welcome h2 {
      color: var(--text);
      font-size: 24px;
    }

    #welcome p {
      max-width: 500px;
      line-height: 1.6;
    }

    #welcome code {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 14px;
    }

    /* Markdown content styles */
    .message.assistant .msg-content h1,
    .message.assistant .msg-content h2,
    .message.assistant .msg-content h3,
    .message.assistant .msg-content h4 {
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 600;
      line-height: 1.3;
    }
    .message.assistant .msg-content h1 { font-size: 1.3em; }
    .message.assistant .msg-content h2 { font-size: 1.15em; }
    .message.assistant .msg-content h3 { font-size: 1.05em; }

    .message.assistant .msg-content p {
      margin: 6px 0;
      line-height: 1.6;
    }

    .message.assistant .msg-content ul,
    .message.assistant .msg-content ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    .message.assistant .msg-content li {
      margin: 3px 0;
    }

    .message.assistant .msg-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 8px 0;
      padding: 4px 12px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border-radius: 0 6px 6px 0;
    }

    .message.assistant .msg-content code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9em;
    }

    .message.assistant .msg-content pre {
      position: relative;
      margin: 8px 0;
      border-radius: 8px;
      overflow: hidden;
    }

    .message.assistant .msg-content pre code {
      display: block;
      padding: 14px 16px;
      background: #282c34;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
      border-radius: 8px;
    }

    .message.assistant .msg-content pre .copy-code-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(255,255,255,0.1);
      color: var(--text-muted);
      border: none;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message.assistant .msg-content pre:hover .copy-code-btn { opacity: 1; }

    .message.assistant .msg-content pre .copy-code-btn:hover {
      background: rgba(255,255,255,0.2);
      color: var(--text);
    }

    .message.assistant .msg-content table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 14px;
      width: 100%;
    }

    .message.assistant .msg-content th,
    .message.assistant .msg-content td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }

    .message.assistant .msg-content th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
    }

    .message.assistant .msg-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .message.assistant .msg-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .message.assistant .msg-content a:hover { text-decoration: underline; }

    .message.assistant .msg-content > *:first-child { margin-top: 0; }
    .message.assistant .msg-content > *:last-child { margin-bottom: 0; }
  </style>
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/atom-one-dark.min.css">
</head>
<body>
  <div id="app-body">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="sidebar-branding">
          <img id="header-logo" src="amd-ryzen-ai-9hx.jpg" alt="AMD Ryzen AI">
          <span id="sidebar-title">Local LLM Chat</span>
          <div id="status-indicator" title="Verbindungsstatus"></div>
        </div>
        <button id="new-chat-btn">+ Neuer Chat</button>
      </div>
      <div id="chat-list"></div>

      <!-- Settings section -->
      <div class="sidebar-section open" id="settings-section">
        <div class="sidebar-section-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="section-title">Einstellungen</span>
          <span class="section-toggle">&#9660;</span>
        </div>
        <div class="sidebar-section-body">
          <div class="sidebar-field">
            <label for="api-url">API URL</label>
            <input type="text" id="api-url" value="http://localhost:8000/api/v1">
          </div>
          <div class="sidebar-field">
            <label for="model-select">Modell</label>
            <select id="model-select">
              <option value="">Lade Modelle...</option>
            </select>
          </div>
        </div>
      </div>

      <!-- System Prompt section -->
      <div class="sidebar-section open" id="system-prompt-section">
        <div class="sidebar-section-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="section-title">System-Prompt</span>
          <span class="section-toggle">&#9660;</span>
        </div>
        <div class="sidebar-section-body">
          <textarea id="system-prompt" rows="3" placeholder="z.B. Du bist ein hilfreicher Assistent, der auf Deutsch antwortet..."></textarea>
        </div>
      </div>

      <!-- System Info section -->
      <div class="sidebar-section" id="sysinfo-section">
        <div class="sidebar-section-header" onclick="toggleSysinfo()">
          <span class="section-title">System-Info</span>
          <span class="section-toggle">&#9660;</span>
        </div>
        <div class="sidebar-section-body">
          <div id="sysinfo-content">
            <div class="sysinfo-loading">Lade...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div id="main-content">
      <div id="chat-container">
        <div id="welcome">
          <h2>Willkommen bei Local LLM Chat</h2>
          <p>
            Stelle sicher, dass Lemonade Server lauft.
            Starte ihn z.B. mit:
          </p>
          <p><code>lemonade run Gemma-3-4b-it-GGUF</code></p>
          <p>
            Die Anwendung verbindet sich automatisch mit der API unter
            <code>http://localhost:8000/api/v1</code>.
          </p>
        </div>
      </div>

      <div id="input-area">
        <textarea id="message-input" rows="1" placeholder="Nachricht eingeben... (Enter = Senden, Shift+Enter = Zeilenumbruch)"></textarea>
        <button id="send-btn">Senden</button>
        <button id="clear-btn">Leeren</button>
      </div>
    </div>
  </div>

  <script>
    // --- Configure marked.js with highlight.js ---
    marked.use({
      breaks: true,
      gfm: true,
      renderer: {
        code({ text, lang }) {
          const language = lang || '';
          let highlighted;
          try {
            highlighted = language && hljs.getLanguage(language)
              ? hljs.highlight(text, { language }).value
              : hljs.highlightAuto(text).value;
          } catch (e) {
            highlighted = text;
          }
          const langLabel = language ? `<span style="position:absolute;top:6px;left:12px;font-size:11px;color:#888;">${language}</span>` : '';
          return `<pre>${langLabel}<button class="copy-code-btn" onclick="copyCode(this)">Kopieren</button><code class="hljs${language ? ' language-' + language : ''}">${highlighted}</code></pre>`;
        }
      }
    });

    function renderMarkdown(text) {
      try {
        return marked.parse(text);
      } catch (e) {
        console.error('Markdown parse error:', e);
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    function copyCode(btn) {
      const code = btn.parentElement.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Kopiert!';
        setTimeout(() => btn.textContent = 'Kopieren', 1500);
      });
    }

    // --- Storage helpers ---
    const STORAGE_KEY = 'llm-chat-conversations';
    const SETTINGS_KEY = 'llm-chat-settings';

    function loadConversations() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveConversations(convos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(convos));
    }

    function loadSettings() {
      try {
        return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
      } catch { return {}; }
    }

    function saveSettings(settings) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function getConversationTitle(messages) {
      const firstUser = messages.find(m => m.role === 'user');
      if (!firstUser) return 'Neuer Chat';
      const text = firstUser.content.trim();
      return text.length > 40 ? text.slice(0, 40) + '...' : text;
    }

    // --- State ---
    const state = {
      conversations: loadConversations(),
      currentConvoId: null,
      messages: [],
      isGenerating: false,
      apiUrl: 'http://localhost:8000/api/v1',
      model: '',
      systemPrompt: '',
      abortController: null,
    };

    // Load saved settings
    const savedSettings = loadSettings();
    if (savedSettings.apiUrl) state.apiUrl = savedSettings.apiUrl;
    if (savedSettings.systemPrompt) state.systemPrompt = savedSettings.systemPrompt;

    // --- DOM Elements ---
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');
    const apiUrlInput = document.getElementById('api-url');
    const modelSelect = document.getElementById('model-select');
    const statusIndicator = document.getElementById('status-indicator');
    const welcome = document.getElementById('welcome');
    const chatList = document.getElementById('chat-list');
    const newChatBtn = document.getElementById('new-chat-btn');
    const systemPromptInput = document.getElementById('system-prompt');
    const sysinfoContent = document.getElementById('sysinfo-content');

    // Apply saved settings to UI
    apiUrlInput.value = state.apiUrl;
    systemPromptInput.value = state.systemPrompt;

    // --- System Prompt ---
    systemPromptInput.addEventListener('input', () => {
      state.systemPrompt = systemPromptInput.value;
      saveSettings({ apiUrl: state.apiUrl, systemPrompt: state.systemPrompt, model: state.model });
    });

    // --- Auto-resize textarea ---
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    });

    // --- Send on Enter ---
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearCurrentChat);
    newChatBtn.addEventListener('click', createNewChat);

    // --- API URL change ---
    apiUrlInput.addEventListener('change', () => {
      state.apiUrl = apiUrlInput.value.replace(/\/+$/, '');
      saveSettings({ apiUrl: state.apiUrl, systemPrompt: state.systemPrompt, model: state.model });
      fetchModels();
    });

    // --- Model change ---
    modelSelect.addEventListener('change', () => {
      state.model = modelSelect.value;
      saveSettings({ apiUrl: state.apiUrl, systemPrompt: state.systemPrompt, model: state.model });
    });

    // --- System Info toggle ---
    function toggleSysinfo() {
      const section = document.getElementById('sysinfo-section');
      section.classList.toggle('open');
      if (section.classList.contains('open')) {
        fetchSystemInfo();
      }
    }

    // --- Conversation management ---
    function createNewChat() {
      const convo = {
        id: generateId(),
        title: 'Neuer Chat',
        messages: [],
        createdAt: Date.now(),
      };
      state.conversations.unshift(convo);
      saveConversations(state.conversations);
      switchToConversation(convo.id);
    }

    function switchToConversation(id) {
      saveCurrentConversation();
      state.currentConvoId = id;
      const convo = state.conversations.find(c => c.id === id);
      state.messages = convo ? [...convo.messages] : [];
      renderChat();
      renderChatList();
      messageInput.focus();
    }

    function saveCurrentConversation() {
      if (!state.currentConvoId) return;
      const convo = state.conversations.find(c => c.id === state.currentConvoId);
      if (convo) {
        convo.messages = [...state.messages];
        convo.title = getConversationTitle(convo.messages);
        saveConversations(state.conversations);
      }
    }

    function deleteConversation(id) {
      state.conversations = state.conversations.filter(c => c.id !== id);
      saveConversations(state.conversations);
      if (state.currentConvoId === id) {
        if (state.conversations.length > 0) {
          switchToConversation(state.conversations[0].id);
        } else {
          createNewChat();
        }
      } else {
        renderChatList();
      }
    }

    function renderChatList() {
      chatList.innerHTML = '';
      state.conversations.forEach(convo => {
        const item = document.createElement('div');
        item.className = 'chat-item' + (convo.id === state.currentConvoId ? ' active' : '');

        const title = document.createElement('span');
        title.className = 'chat-title';
        title.textContent = convo.title;
        title.addEventListener('click', () => switchToConversation(convo.id));

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-chat-btn';
        deleteBtn.textContent = '\u00D7';
        deleteBtn.title = 'Chat loeschen';
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteConversation(convo.id);
        });

        item.appendChild(title);
        item.appendChild(deleteBtn);
        chatList.appendChild(item);
      });
    }

    function renderChat() {
      chatContainer.innerHTML = '';
      if (state.messages.length === 0) {
        chatContainer.appendChild(welcome);
        welcome.style.display = '';
      } else {
        welcome.style.display = 'none';
        state.messages.forEach(msg => {
          appendMessage(msg.role, msg.content, false);
        });
        scrollToBottom();
      }
    }

    // --- Fetch available models ---
    async function fetchModels() {
      try {
        const res = await fetch(`${state.apiUrl}/models`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        modelSelect.innerHTML = '';
        const models = data.data || data.models || [];
        if (models.length === 0) {
          modelSelect.innerHTML = '<option value="">Keine Modelle gefunden</option>';
          statusIndicator.className = 'error';
          return;
        }

        models.forEach((m) => {
          const name = m.id || m.name || m;
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          modelSelect.appendChild(opt);
        });

        state.model = models[0].id || models[0].name || models[0];

        const saved = loadSettings().model;
        if (saved) {
          const match = models.find(m => (m.id || m.name || m) === saved);
          if (match) {
            state.model = saved;
            modelSelect.value = saved;
          }
        }

        statusIndicator.className = 'connected';
        statusIndicator.title = 'Verbunden';
      } catch (err) {
        modelSelect.innerHTML = '<option value="">Verbindung fehlgeschlagen</option>';
        statusIndicator.className = 'error';
        statusIndicator.title = `Fehler: ${err.message}`;
        console.error('Modelle laden fehlgeschlagen:', err);
      }
    }

    // --- Build messages array for API (with system prompt) ---
    function buildApiMessages() {
      const msgs = [];
      if (state.systemPrompt.trim()) {
        msgs.push({ role: 'system', content: state.systemPrompt.trim() });
      }
      msgs.push(...state.messages);
      return msgs;
    }

    // --- Send message ---
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || state.isGenerating) return;

      if (!state.currentConvoId) {
        createNewChat();
      }

      welcome.style.display = 'none';

      state.messages.push({ role: 'user', content: text });
      appendMessage('user', text);

      messageInput.value = '';
      messageInput.style.height = 'auto';

      saveCurrentConversation();
      renderChatList();

      state.isGenerating = true;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Stop';
      sendBtn.disabled = false;
      sendBtn.onclick = stopGenerating;

      const assistantEl = appendMessage('assistant', '');
      const contentEl = assistantEl.querySelector('.msg-content');
      showTypingIndicator(contentEl);

      state.abortController = new AbortController();
      let assistantContent = '';

      try {
        const res = await fetch(`${state.apiUrl}/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: state.model,
            messages: buildApiMessages(),
            stream: true,
          }),
          signal: state.abortController.signal,
        });

        if (!res.ok) {
          const errBody = await res.text().catch(() => '');
          throw new Error(`API Fehler: HTTP ${res.status} ${res.statusText} ${errBody}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let renderTimeout = null;

        contentEl.innerHTML = '';

        function scheduleRender() {
          if (!renderTimeout) {
            renderTimeout = setTimeout(() => {
              contentEl.innerHTML = renderMarkdown(assistantContent);
              scrollToBottom();
              renderTimeout = null;
            }, 80);
          }
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;

            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content;
              if (delta) {
                assistantContent += delta;
                scheduleRender();
              }
            } catch (e) {}
          }
        }

        if (renderTimeout) clearTimeout(renderTimeout);

        if (assistantContent) {
          contentEl.innerHTML = renderMarkdown(assistantContent);
          state.messages.push({ role: 'assistant', content: assistantContent });
        } else {
          contentEl.textContent = '(Keine Antwort erhalten)';
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          const partial = assistantContent || contentEl.textContent;
          if (partial) {
            contentEl.innerHTML = renderMarkdown(partial + '\n\n*[Abgebrochen]*');
            state.messages.push({ role: 'assistant', content: partial });
          } else {
            contentEl.innerHTML = renderMarkdown('*[Abgebrochen]*');
          }
        } else {
          contentEl.innerHTML = '';
          try {
            const res2 = await fetch(`${state.apiUrl}/chat/completions`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: state.model,
                messages: buildApiMessages(),
                stream: false,
              }),
            });
            if (!res2.ok) throw new Error(`HTTP ${res2.status}`);
            const data = await res2.json();
            const content = data.choices?.[0]?.message?.content || '';
            if (content) {
              contentEl.innerHTML = renderMarkdown(content);
              state.messages.push({ role: 'assistant', content });
            } else {
              contentEl.textContent = '(Keine Antwort)';
            }
          } catch (fallbackErr) {
            contentEl.innerHTML = renderMarkdown(`**Fehler:** ${err.message}\n\nStelle sicher, dass Lemonade Server läuft und unter \`${state.apiUrl}\` erreichbar ist.`);
          }
        }
      } finally {
        state.isGenerating = false;
        sendBtn.textContent = 'Senden';
        sendBtn.onclick = sendMessage;
        sendBtn.disabled = false;
        state.abortController = null;
        saveCurrentConversation();
        renderChatList();
        scrollToBottom();
        messageInput.focus();
      }
    }

    function stopGenerating() {
      if (state.abortController) {
        state.abortController.abort();
      }
    }

    function copyMessage(btn) {
      const msgEl = btn.closest('.message');
      const contentEl = msgEl.querySelector('.msg-content');
      const msgIndex = Array.from(chatContainer.querySelectorAll('.message')).indexOf(msgEl);
      const rawContent = state.messages[msgIndex]?.content || contentEl.textContent;
      navigator.clipboard.writeText(rawContent).then(() => {
        btn.textContent = 'Kopiert!';
        setTimeout(() => btn.textContent = 'Kopieren', 1500);
      });
    }

    function resendMessage(btn) {
      if (state.isGenerating) return;
      const msgEl = btn.closest('.message');
      const contentEl = msgEl.querySelector('.msg-content');
      const text = contentEl.textContent;
      if (text) {
        messageInput.value = text;
        messageInput.focus();
        sendMessage();
      }
    }

    function appendMessage(role, content, addToState) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const header = document.createElement('div');
      header.className = 'msg-header';

      const label = document.createElement('span');
      label.className = 'role-label';
      label.textContent = role === 'user' ? 'Du' : 'Assistent';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-msg-btn';
      copyBtn.textContent = 'Kopieren';
      copyBtn.addEventListener('click', function() { copyMessage(this); });

      header.appendChild(label);
      if (role === 'user') {
        const resendBtn = document.createElement('button');
        resendBtn.className = 'resend-msg-btn';
        resendBtn.textContent = 'Erneut senden';
        resendBtn.addEventListener('click', function() { resendMessage(this); });
        header.appendChild(resendBtn);
      }
      header.appendChild(copyBtn);

      const contentEl = document.createElement('div');
      contentEl.className = 'msg-content';

      if (role === 'assistant' && content) {
        contentEl.innerHTML = renderMarkdown(content);
      } else {
        contentEl.textContent = content;
      }

      div.appendChild(header);
      div.appendChild(contentEl);
      chatContainer.appendChild(div);
      scrollToBottom();
      return div;
    }

    function showTypingIndicator(el) {
      el.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function clearCurrentChat() {
      if (!state.currentConvoId) return;
      state.messages = [];
      saveCurrentConversation();
      renderChat();
      renderChatList();
    }

    // --- Init ---
    fetchModels();

    if (state.conversations.length > 0) {
      switchToConversation(state.conversations[0].id);
    } else {
      createNewChat();
    }

    messageInput.focus();

    // --- System Info ---
    async function fetchSystemInfo() {
      try {
        const res = await fetch(`${state.apiUrl}/system-info`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const info = await res.json();
        renderSystemInfo(info);
      } catch (err) {
        sysinfoContent.innerHTML = `<div class="sysinfo-loading">Nicht verfuegbar: ${err.message}</div>`;
      }
    }

    function renderSystemInfo(info) {
      const devices = info.devices || {};
      const cpu = devices.cpu || {};
      const igpu = devices.amd_igpu || {};
      const npu = devices.amd_npu || {};
      const dgpus = devices.amd_dgpu || [];

      let cards = '';

      cards += `
        <div class="sysinfo-card-sm">
          <div class="card-title">CPU</div>
          <div class="card-value">
            ${cpu.name || info.Processor || 'Unbekannt'}
            <div class="detail">${cpu.cores || '?'} Kerne / ${cpu.threads || '?'} Threads</div>
            ${info['CPU Max Clock'] ? `<div class="detail">Max: ${info['CPU Max Clock']}</div>` : ''}
          </div>
        </div>`;

      cards += `
        <div class="sysinfo-card-sm">
          <div class="card-title">NPU</div>
          <div class="card-value">
            ${npu.name ? npu.name : 'Nicht erkannt'}
            ${npu.family ? `<div class="detail">${npu.family}</div>` : ''}
            <span class="status-badge ${npu.available ? 'available' : 'unavailable'}">
              ${npu.available ? 'Verfuegbar' : 'Nicht verfuegbar'}
            </span>
          </div>
        </div>`;

      if (igpu.name) {
        cards += `
          <div class="sysinfo-card-sm">
            <div class="card-title">iGPU</div>
            <div class="card-value">
              ${igpu.name}
              ${igpu.vram_gb ? `<div class="detail">VRAM: ${igpu.vram_gb} GB</div>` : ''}
              <span class="status-badge ${igpu.available ? 'available' : 'unavailable'}">
                ${igpu.available ? 'Verfuegbar' : 'Nicht verfuegbar'}
              </span>
            </div>
          </div>`;
      }

      if (Array.isArray(dgpus)) {
        dgpus.forEach((dgpu, i) => {
          cards += `
            <div class="sysinfo-card-sm">
              <div class="card-title">dGPU${dgpus.length > 1 ? ` #${i+1}` : ''}</div>
              <div class="card-value">
                ${dgpu.name || 'Unbekannt'}
                ${dgpu.vram_gb ? `<div class="detail">VRAM: ${dgpu.vram_gb} GB</div>` : ''}
                <span class="status-badge ${dgpu.available ? 'available' : 'unavailable'}">
                  ${dgpu.available ? 'Verfuegbar' : 'Nicht verfuegbar'}
                </span>
              </div>
            </div>`;
        });
      }

      cards += `
        <div class="sysinfo-card-sm">
          <div class="card-title">System</div>
          <div class="card-value">
            ${info['OEM System'] || 'Unbekannt'}
            <div class="detail">RAM: ${info['Physical Memory'] || '?'}</div>
            <div class="detail">OS: ${info['OS Version'] || '?'}</div>
          </div>
        </div>`;

      sysinfoContent.innerHTML = `<div class="sysinfo-grid-sidebar">${cards}</div>`;
    }

    // Retry connection every 5s if not connected
    setInterval(() => {
      if (statusIndicator.className !== 'connected') {
        fetchModels();
      }
    }, 5000);
  </script>
</body>
</html>
