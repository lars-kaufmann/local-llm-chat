<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local LLM Chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-chat: #0f3460;
      --text: #e6e6e6;
      --text-muted: #a0a0b0;
      --accent: #e94560;
      --user-bg: #533483;
      --assistant-bg: #1a1a40;
      --input-bg: #16213e;
      --border: #2a2a4a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .settings {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .settings input, .settings select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
    }

    .settings input:focus, .settings select:focus {
      outline: none;
      border-color: var(--accent);
    }

    #status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-left: 8px;
      transition: background 0.3s;
    }

    #status-indicator.connected { background: #4caf50; }
    #status-indicator.error { background: var(--accent); }

    /* Chat area */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.system-msg {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      padding: 4px 12px;
    }

    .message .role-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    .typing-indicator {
      display: inline-block;
    }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Input area */
    #input-area {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 150px;
      outline: none;
      transition: border-color 0.2s;
    }

    #message-input:focus {
      border-color: var(--accent);
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    #clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Scrollbar */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Welcome screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-muted);
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    #welcome h2 {
      color: var(--text);
      font-size: 24px;
    }

    #welcome p {
      max-width: 500px;
      line-height: 1.6;
    }

    #welcome code {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 14px;
    }

    /* System Info Panel */
    #sysinfo-toggle {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    #sysinfo-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #sysinfo-panel {
      display: none;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    #sysinfo-panel.open {
      display: block;
    }

    .sysinfo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .sysinfo-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .sysinfo-card .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .sysinfo-card .card-value {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    .sysinfo-card .card-value .detail {
      font-size: 12px;
      color: var(--text-muted);
    }

    .sysinfo-card .status-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .status-badge.available {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .status-badge.unavailable {
      background: rgba(233, 69, 96, 0.2);
      color: var(--accent);
    }

    .sysinfo-loading {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div style="display:flex; align-items:center; gap:8px;">
      <h1>Local LLM Chat</h1>
      <div id="status-indicator" title="Verbindungsstatus"></div>
    </div>
    <div class="settings">
      <label for="api-url">API URL:</label>
      <input type="text" id="api-url" value="http://localhost:8000/api/v1" size="30">
      <label for="model-select">Modell:</label>
      <select id="model-select">
        <option value="">Lade Modelle...</option>
      </select>
      <button id="sysinfo-toggle">System-Info</button>
    </div>
  </header>

  <div id="sysinfo-panel">
    <div class="sysinfo-loading">Lade Systeminformationen...</div>
  </div>

  <div id="chat-container">
    <div id="welcome">
      <h2>Willkommen bei Local LLM Chat</h2>
      <p>
        Stelle sicher, dass Lemonade Server lauft.
        Starte ihn z.B. mit:
      </p>
      <p><code>lemonade run Gemma-3-4b-it-GGUF</code></p>
      <p>
        Die Anwendung verbindet sich automatisch mit der API unter
        <code>http://localhost:8000/api/v1</code>.
      </p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="message-input" rows="1" placeholder="Nachricht eingeben... (Enter = Senden, Shift+Enter = Zeilenumbruch)"></textarea>
    <button id="send-btn">Senden</button>
    <button id="clear-btn">Leeren</button>
  </div>

  <script>
    // --- State ---
    const state = {
      messages: [], // {role, content}
      isGenerating: false,
      apiUrl: 'http://localhost:8000/api/v1',
      model: '',
      abortController: null,
    };

    // --- DOM Elements ---
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');
    const apiUrlInput = document.getElementById('api-url');
    const modelSelect = document.getElementById('model-select');
    const statusIndicator = document.getElementById('status-indicator');
    const welcome = document.getElementById('welcome');

    // --- Auto-resize textarea ---
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    });

    // --- Send on Enter ---
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearChat);

    // --- API URL change ---
    apiUrlInput.addEventListener('change', () => {
      state.apiUrl = apiUrlInput.value.replace(/\/+$/, '');
      fetchModels();
      fetchSystemInfo();
    });

    // --- Model change ---
    modelSelect.addEventListener('change', () => {
      state.model = modelSelect.value;
    });

    // --- Fetch available models ---
    async function fetchModels() {
      try {
        const res = await fetch(`${state.apiUrl}/models`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        modelSelect.innerHTML = '';
        const models = data.data || data.models || [];
        if (models.length === 0) {
          modelSelect.innerHTML = '<option value="">Keine Modelle gefunden</option>';
          statusIndicator.className = 'error';
          return;
        }

        models.forEach((m) => {
          const name = m.id || m.name || m;
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          modelSelect.appendChild(opt);
        });

        state.model = models[0].id || models[0].name || models[0];
        statusIndicator.className = 'connected';
        statusIndicator.title = 'Verbunden';
      } catch (err) {
        modelSelect.innerHTML = '<option value="">Verbindung fehlgeschlagen</option>';
        statusIndicator.className = 'error';
        statusIndicator.title = `Fehler: ${err.message}`;
        console.error('Modelle laden fehlgeschlagen:', err);
      }
    }

    // --- Send message ---
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || state.isGenerating) return;

      // Hide welcome
      if (welcome) welcome.style.display = 'none';

      // Add user message
      state.messages.push({ role: 'user', content: text });
      appendMessage('user', text);

      messageInput.value = '';
      messageInput.style.height = 'auto';

      // Start generating
      state.isGenerating = true;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Stop';
      sendBtn.disabled = false;
      sendBtn.onclick = stopGenerating;

      // Add assistant placeholder
      const assistantEl = appendMessage('assistant', '');
      const contentEl = assistantEl.querySelector('.msg-content');
      showTypingIndicator(contentEl);

      state.abortController = new AbortController();

      try {
        const res = await fetch(`${state.apiUrl}/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: state.model,
            messages: state.messages,
            stream: true,
          }),
          signal: state.abortController.signal,
        });

        if (!res.ok) {
          throw new Error(`API Fehler: HTTP ${res.status} ${res.statusText}`);
        }

        // Stream response
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let assistantContent = '';
        let buffer = '';

        contentEl.innerHTML = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;

            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content;
              if (delta) {
                assistantContent += delta;
                contentEl.textContent = assistantContent;
                scrollToBottom();
              }
            } catch (e) {
              // ignore parse errors on partial chunks
            }
          }
        }

        if (assistantContent) {
          state.messages.push({ role: 'assistant', content: assistantContent });
        } else {
          contentEl.textContent = '(Keine Antwort erhalten)';
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          contentEl.textContent += '\n\n[Abgebrochen]';
          const partial = contentEl.textContent.replace('\n\n[Abgebrochen]', '');
          if (partial) {
            state.messages.push({ role: 'assistant', content: partial });
          }
        } else {
          contentEl.innerHTML = '';
          // Try non-streaming fallback
          try {
            const res2 = await fetch(`${state.apiUrl}/chat/completions`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: state.model,
                messages: state.messages,
                stream: false,
              }),
            });
            if (!res2.ok) throw new Error(`HTTP ${res2.status}`);
            const data = await res2.json();
            const content = data.choices?.[0]?.message?.content || '';
            contentEl.textContent = content || '(Keine Antwort)';
            if (content) {
              state.messages.push({ role: 'assistant', content });
            }
          } catch (fallbackErr) {
            contentEl.textContent = `Fehler: ${err.message}\n\nStelle sicher, dass Lemonade Server lauft und unter ${state.apiUrl} erreichbar ist.`;
          }
        }
      } finally {
        state.isGenerating = false;
        sendBtn.textContent = 'Senden';
        sendBtn.onclick = sendMessage;
        sendBtn.disabled = false;
        state.abortController = null;
        scrollToBottom();
        messageInput.focus();
      }
    }

    // --- Stop generating ---
    function stopGenerating() {
      if (state.abortController) {
        state.abortController.abort();
      }
    }

    // --- Append message to chat ---
    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const label = document.createElement('span');
      label.className = 'role-label';
      label.textContent = role === 'user' ? 'Du' : 'Assistent';

      const contentEl = document.createElement('div');
      contentEl.className = 'msg-content';
      contentEl.textContent = content;

      div.appendChild(label);
      div.appendChild(contentEl);
      chatContainer.appendChild(div);
      scrollToBottom();
      return div;
    }

    // --- Typing indicator ---
    function showTypingIndicator(el) {
      el.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    }

    // --- Scroll to bottom ---
    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // --- Clear chat ---
    function clearChat() {
      state.messages = [];
      chatContainer.innerHTML = '';
      if (welcome) {
        welcome.style.display = '';
        chatContainer.appendChild(welcome);
      }
    }

    // --- Init ---
    fetchModels();
    fetchSystemInfo();
    messageInput.focus();

    // --- System Info ---
    const sysinfoToggle = document.getElementById('sysinfo-toggle');
    const sysinfoPanel = document.getElementById('sysinfo-panel');

    sysinfoToggle.addEventListener('click', () => {
      sysinfoPanel.classList.toggle('open');
      if (sysinfoPanel.classList.contains('open')) {
        fetchSystemInfo();
      }
    });

    async function fetchSystemInfo() {
      try {
        const res = await fetch(`${state.apiUrl}/system-info`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const info = await res.json();
        renderSystemInfo(info);
      } catch (err) {
        sysinfoPanel.innerHTML = `<div class="sysinfo-loading">System-Info nicht verfuegbar: ${err.message}</div>`;
      }
    }

    function renderSystemInfo(info) {
      const devices = info.devices || {};
      const cpu = devices.cpu || {};
      const igpu = devices.amd_igpu || {};
      const npu = devices.amd_npu || {};
      const dgpus = devices.amd_dgpu || [];

      let cards = '';

      // CPU
      cards += `
        <div class="sysinfo-card">
          <div class="card-title">CPU</div>
          <div class="card-value">
            ${cpu.name || info.Processor || 'Unbekannt'}
            <div class="detail">${cpu.cores || '?'} Kerne / ${cpu.threads || '?'} Threads</div>
            ${info['CPU Max Clock'] ? `<div class="detail">Max: ${info['CPU Max Clock']}</div>` : ''}
          </div>
        </div>`;

      // NPU
      cards += `
        <div class="sysinfo-card">
          <div class="card-title">NPU</div>
          <div class="card-value">
            ${npu.name ? npu.name : 'Nicht erkannt'}
            ${npu.family ? `<div class="detail">Architektur: ${npu.family}</div>` : ''}
            ${npu.power_mode ? `<div class="detail">Power-Modus: ${npu.power_mode}</div>` : ''}
            <span class="status-badge ${npu.available ? 'available' : 'unavailable'}">
              ${npu.available ? 'Verfuegbar' : 'Nicht verfuegbar'}
            </span>
          </div>
        </div>`;

      // iGPU
      if (igpu.name) {
        cards += `
          <div class="sysinfo-card">
            <div class="card-title">Integrierte GPU</div>
            <div class="card-value">
              ${igpu.name}
              ${igpu.vram_gb ? `<div class="detail">VRAM: ${igpu.vram_gb} GB</div>` : ''}
              ${igpu.family ? `<div class="detail">Architektur: ${igpu.family}</div>` : ''}
              <span class="status-badge ${igpu.available ? 'available' : 'unavailable'}">
                ${igpu.available ? 'Verfuegbar' : 'Nicht verfuegbar'}
              </span>
            </div>
          </div>`;
      }

      // dGPUs
      if (Array.isArray(dgpus)) {
        dgpus.forEach((dgpu, i) => {
          cards += `
            <div class="sysinfo-card">
              <div class="card-title">Dedizierte GPU${dgpus.length > 1 ? ` #${i+1}` : ''}</div>
              <div class="card-value">
                ${dgpu.name || 'Unbekannt'}
                ${dgpu.vram_gb ? `<div class="detail">VRAM: ${dgpu.vram_gb} GB</div>` : ''}
                ${dgpu.family ? `<div class="detail">Architektur: ${dgpu.family}</div>` : ''}
                <span class="status-badge ${dgpu.available ? 'available' : 'unavailable'}">
                  ${dgpu.available ? 'Verfuegbar' : 'Nicht verfuegbar'}
                </span>
              </div>
            </div>`;
        });
      }

      // System
      cards += `
        <div class="sysinfo-card">
          <div class="card-title">System</div>
          <div class="card-value">
            ${info['OEM System'] || 'Unbekannt'}
            <div class="detail">RAM: ${info['Physical Memory'] || '?'}</div>
            <div class="detail">OS: ${info['OS Version'] || '?'}</div>
            ${info['Windows Power Setting'] ? `<div class="detail">Energieplan: ${info['Windows Power Setting']}</div>` : ''}
          </div>
        </div>`;

      sysinfoPanel.innerHTML = `<div class="sysinfo-grid">${cards}</div>`;
    }

    // Retry connection every 5s if not connected
    setInterval(() => {
      if (statusIndicator.className !== 'connected') {
        fetchModels();
      }
    }, 5000);
  </script>
</body>
</html>
